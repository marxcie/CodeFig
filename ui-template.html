<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/default.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; padding: 0; font: 12px system-ui; height: 100vh; display: flex; }
      
      /* Resizable container */
      .resizable-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        position: relative;
        overflow: hidden;
        width: 100%;
      }
      
      .main-container {
        display: flex;
        flex: 1;
        overflow: hidden;
      }
      
      /* Resizer */
      .resizer {
        width: 1px;
        /* background: #e1e5e9; */
        cursor: col-resize;
        position: relative;
        flex-shrink: 0;
        transition: background-color 0.2s ease;
      }
      
      .resizer:hover {
        background: #007AFF;
      }
      
      .resizer::before {
        content: '';
        position: absolute;
        left: -4px;
        right: -4px;
        top: 0;
        bottom: 0;
        background: transparent;
      }
      
      .resizing {
        background: #007AFF !important;
      }
      
      /* Sidebar */
      .sidebar { 
        width: 240px; 
        min-width: 200px;
        max-width: 400px;
        background: #fff; 
        display: flex; 
        flex-direction: column;
        overflow: hidden;
      }
      
      .sidebar-header { 
        padding: 0px;
        border-bottom: 1px solid #e6e6e6; 
        background: #fff;
      }
      
      .search-container {
        position: relative;
      }
      
      .search-input {
        padding: 12px 20px 12px 20px; 
        width: 100%;
        height: 56px;
        border-radius: 6px;
        font: 11px system-ui;
        font-weight: 600;
        outline: none;
        transition: all 0.2s ease;
        border: none;
      }
      
      .search-input:focus {
        border-color: #e6e6e6;
        background: #f8f9fa;
      }
      
      .search-input::placeholder {
        color: #000;
        opacity: 0.5;
        font-weight: 600;
      }
      
      .script-list { 
        flex: 1; 
        overflow-y: auto; 
        padding: 20px 0;
      }
      
      .plugin-footer {
        padding: 12px 20px;
        border-top: 1px solid #e6e6e6;
        background: #fff;
        display: flex;
        flex-direction: row;
        gap: 12px;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        position: relative;
        flex-shrink: 0;
      }
      
      .footer-left {
        display: flex;
        gap: 12px;
      }
      
      .footer-right {
        display: flex;
        gap: 12px;
      }
      
      .footer-btn {
        height: 32px;
        padding: 0 10px;
        background: #fff;
        border: 1px solid #e6e6e6;
        border-radius: 6px;
        font: 11px system-ui;
        font-weight: 600;
        cursor: pointer;
        text-align: center;
        color: #333;
        white-space: nowrap;
        letter-spacing: -0.11px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .footer-btn.primary {
        background: #3b7bef;
        color: white;
        border-color: #3b7bef;
      }
      
      .footer-btn:hover {
        background: #f8f9fa;
        border-color: #007AFF;
      }
      
      .footer-btn.primary:hover {
        background: #2968d7;
      }
      
      .script-section {
        margin-bottom: 0;
      }
      
      .script-section:not(:last-child) {
        margin-bottom: 20px;
      }
      
      .script-section .divider {
        height: 1px;
        background: #e5e5e5;
        margin: 0;
      }
      
      .section-header {
        padding: 0 20px 12px 20px;
        font: 11px system-ui;
        font-weight: 500;
        color: #6d6d6d;
        letter-spacing: -0.22px;
        background: transparent;
      }
      
      .section-header.example-scripts {
        font: 8px system-ui;
        font-weight: 600;
        letter-spacing: -0.08px;
        text-transform: uppercase;
        color: #afafaf;
        padding: 6px 20px 6px 20px;
      }
      
      .section-header.user-scripts {
        font: 8px system-ui;
        font-weight: 600;
        letter-spacing: -0.08px;
        text-transform: uppercase;
        color: #afafaf;
        padding: 0px 20px 6px 20px;
      }
      
      .section-header.hidden {
        display: none;
      }
      
      .script-item { 
        padding: 6px 20px;
        cursor: pointer; 
        display: flex;
        align-items: center;
        font: 11px system-ui;
        font-weight: 500;
        color: #6d6d6d;
        letter-spacing: -0.22px;
      }
      
      .script-item.user-script {
        font-weight: 500;
        letter-spacing: -0.11px;
        color: #000;
      }
      
      .script-item:hover { background: #f0f0f0; }
      .script-item.active { background: #f0f0f0; color: #000; }
      
      .script-item .name {
        flex: 1;
      }
      
      .no-results {
        padding: 20px 12px;
        text-align: center;
        color: #86868b;
        font: 12px system-ui;
        font-style: italic;
      }
      
      /* Main Content */
      .main-content { 
        flex: 1; 
        display: flex; 
        flex-direction: column; 
        overflow: hidden;
        min-width: 300px;
        width: 100%;
      }
      
      .editor-header { 
        padding: 12px 16px 12px 24px; 
        background: #fff; 
        border-bottom: 1px solid #e1e5e9; 
        display: flex; 
        align-items: center; 
        justify-content: space-between;
        width: 100%;
      }
      
      .header-left {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 1;
      }
      
      .script-title { 
        font-size: 14px; 
        font-weight: 600; 
        color: #1d1d1f;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 4px;
        transition: background-color 0.2s ease;
      }
      
      .script-title:hover {
        background-color: #f0f0f0;
      }
      
      .script-title.editing {
        background-color: #fff;
        border: 1px solid #007AFF;
        outline: none;
      }
      
      .script-status { 
        font-size: 11px; 
        color: #86868b; 
        background: #f5f5f7; 
        padding: 2px 8px; 
        border-radius: 12px;
      }
      
      .header-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      
      .editor-container { 
        flex: 1; 
        overflow: hidden; 
        position: relative;
        width: 100%;
        display: flex;
        flex-direction: column;
      }
      
      .CodeMirror { 
        height: 100%; 
        width: 100%;
        font-size: 12px; 
        border: none;
        background: #fff !important;
      }
      
      .CodeMirror-scroll {
        overflow: auto !important;
      }
      
      .CodeMirror-gutters {
        background: #f8f9fa !important;
        border-right: 1px solid #e1e5e9 !important;
      }
      
      .CodeMirror-linenumber {
        color: #86868b !important;
      }
      
      .CodeMirror-cursor {
        border-left: 1px solid #007AFF !important;
      }
      
      .CodeMirror-selected {
        background: #e8f4fd !important;
      }
      
      .btn { 
        height: 32px;
        padding: 0 10px; 
        border: 1px solid #e6e6e6; 
        background: #fff; 
        border-radius: 6px; 
        font: 11px system-ui;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        letter-spacing: -0.11px;
      }
      
      .btn:hover { background: #f8f9fa; border-color: #007AFF; }
      .btn.primary { background: #3b7bef; color: white; border-color: #3b7bef; }
      .btn.primary:hover { background: #2968d7; }
      .btn.danger { background: #fff; color: #333; border-color: #e6e6e6; }
      .btn.danger:hover { background: #f8f9fa; border-color: #007AFF; }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .btn:disabled:hover { background: #fff; border-color: #e6e6e6; }
      
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <div class="resizable-container">
      <div class="main-container">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
          <div class="sidebar-header">
            <div class="search-container">
              <input type="text" id="searchInput" class="search-input" placeholder="Search...">
            </div>
          </div>
          <div class="script-list" id="scriptList">
            <!-- Scripts will be populated here -->
          </div>
        </div>
        
        <!-- Resizer -->
        <div class="resizer" id="resizer"></div>
        
        <!-- Main Content -->
        <div class="main-content">
          <div class="editor-header">
            <div class="header-left">
              <div class="script-title" id="scriptTitle">Select a script</div>
              <div class="script-status" id="scriptStatus">Ready</div>
            </div>
            <div class="header-right">
              <button class="btn" id="saveBtn" disabled>Save</button>
              <button class="btn danger" id="deleteBtn" disabled>Delete</button>
              <button class="btn primary" id="runBtn">Run</button>
            </div>
          </div>
          
          <div class="editor-container">
            <textarea id="code" placeholder="// Select a script from the sidebar or create a new one"></textarea>
          </div>
        </div>
      </div>
      
      <!-- Footer outside main container for full width -->
      <div class="plugin-footer">
        <div class="footer-left">
          <button class="footer-btn primary" id="newScript">New Script</button>
        </div>
        <div class="footer-right">
          <button class="footer-btn" id="exportBtn">Export Script</button>
          <button class="footer-btn" id="exportAllBtn">Export All User Scripts</button>
          <button class="footer-btn" id="importBtn">Import Script</button>
        </div>
      </div>
    </div>

    <script>
      // Pre-built scripts
      const prebuiltScripts = [
        // PLACEHOLDER_FOR_SCRIPTS
      ];

      // State
      let currentScript = null;
      let userScripts = [];
      let allScripts = [];
      let originalCode = '';
      let isResizing = false;

      // DOM elements
      const scriptList = document.getElementById('scriptList');
      const scriptTitle = document.getElementById('scriptTitle');
      const scriptStatus = document.getElementById('scriptStatus');
      const codeTextarea = document.getElementById('code');
      const newScriptBtn = document.getElementById('newScript');
      const runBtn = document.getElementById('runBtn');
      const saveBtn = document.getElementById('saveBtn');
      const deleteBtn = document.getElementById('deleteBtn');
      const exportBtn = document.getElementById('exportBtn');
      const importBtn = document.getElementById('importBtn');
      const exportAllBtn = document.getElementById('exportAllBtn');
      const resizer = document.getElementById('resizer');
      const sidebar = document.getElementById('sidebar');
      const searchInput = document.getElementById('searchInput');

      // Initialize CodeMirror
      const code = CodeMirror.fromTextArea(codeTextarea, {
        mode: 'javascript',
        theme: 'default',
        lineNumbers: true,
        indentUnit: 2,
        tabSize: 2,
        lineWrapping: false,
        autoCloseBrackets: true,
        matchBrackets: true,
        foldGutter: true,
        gutters: ['CodeMirror-linenumbers', 'CodeMirror-foldgutter'],
        scrollbarStyle: 'native'
      });

      // Ensure CodeMirror fills the container properly
      setTimeout(() => {
        code.refresh();
        code.setSize(null, '100%');
      }, 100);

      function post(type, data = {}) {
        parent.postMessage({ pluginMessage: { type, ...data } }, '*');
      }

      // Placeholder for all the JavaScript functionality
      console.log('CodeFig UI Template Loaded');
      
      // This is a minimal template - the build script will inject the full functionality
    </script>
  </body>
</html>
