# Build the Figma plugin and attach a ready-to-import zip to the GitHub Release.
# Trigger: push a version tag, e.g. git tag v1.0.1 && git push origin v1.0.1
name: Release plugin zip

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build:production

      # Versioned name for archives; fixed name so this URL always points at the latest build:
      # https://github.com/marxcie/codefig/releases/latest/download/codefig-plugin.zip
      - name: Create plugin zips
        run: |
          zip -r "codefig-${{ github.ref_name }}-plugin.zip" manifest.json dist/
          cp "codefig-${{ github.ref_name }}-plugin.zip" codefig-plugin.zip

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            codefig-${{ github.ref_name }}-plugin.zip
            codefig-plugin.zip
          generate_release_notes: true
