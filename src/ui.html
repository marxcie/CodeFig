      // Runtime import system with memory optimization
      function processRuntimeImports(code) {
        let processedCode = code;
        
        // Skip import processing for simple scripts (< 500 chars) to reduce overhead
        if (code.length < 500 && !code.includes('@import')) {
          return code;
        }
        
        // Handle multiple syntax types:
        // 1. @import { func1, func2 } from "Script Name"
        // 2. @import { func1, func2 } (defaults to core library)
        // 3. @import * from "Script Name" (wildcard import)
        // 4. @import * (wildcard from core library)
        
        // Pattern 1: @import with 'from' clause
        const importWithFromRegex = /@import\s+\{([^}]+)\}\s+from\s+['"]([^'"]+)['"]/g;
        let match;
        
        while ((match = importWithFromRegex.exec(code)) !== null) {
          const functionList = match[1];
          const scriptName = match[2];
          const functionNames = functionList.split(',').map(name => name.trim());
          
          processedCode = processImport(processedCode, match[0], functionNames, scriptName);
        }
        
        // Pattern 2: @import without 'from' (defaults to core library)
        const importSimpleRegex = /@import\s+\{([^}]+)\}(?!\s+from)/g;
        
        while ((match = importSimpleRegex.exec(code)) !== null) {
          const functionList = match[1];
          const functionNames = functionList.split(',').map(name => name.trim());
          
          processedCode = processImport(processedCode, match[0], functionNames, '@Core Library');
        }
        
        // Pattern 3: @import * from "Script Name" (wildcard import)
        const wildcardWithFromRegex = /@import\s+\*\s+from\s+['"]([^'"]+)['"]/g;
        
        while ((match = wildcardWithFromRegex.exec(code)) !== null) {
          const scriptName = match[1];
          
          // Get all functions from the source script
          const sourceScript = allScripts.find(script => {
            if (script.name === scriptName) return true;
            if (script.name.includes(scriptName)) return true;
            if (script.filename === scriptName + '.ts') return true;
            return false;
          });
          
          if (sourceScript) {
            const functionNames = extractAllFunctionNames(sourceScript.code);
            processedCode = processImport(processedCode, match[0], functionNames, scriptName);
          } else {
            console.warn('Wildcard import: Script not found:', scriptName);
            processedCode = processedCode.replace(match[0], '// Import failed: Script not found');
          }
        }
        
        // Pattern 4: @import * (wildcard from core library)
        const wildcardSimpleRegex = /@import\s+\*(?!\s+from)/g;
        
        while ((match = wildcardSimpleRegex.exec(code)) !== null) {
          // Get all functions from the core library
          const coreScript = allScripts.find(script => script.name.includes('@Core Library'));
          
          if (coreScript) {
            const functionNames = extractAllFunctionNames(coreScript.code);
            processedCode = processImport(processedCode, match[0], functionNames, '@Core Library');
          } else {
            console.warn('Wildcard import: Core library not found');
            processedCode = processedCode.replace(match[0], '// Import failed: Core library not found');
          }
        }
        
        return processedCode;
      }
      
      // Extract all function names from a script
      function extractAllFunctionNames(code) {
        const functionNames = [];
        
        // Match function declarations: function functionName(...)
        const functionRegex = /function\s+([a-zA-Z_$][a-zA-Z0-9_$]*)\s*\(/g;
        let match;
        while ((match = functionRegex.exec(code)) !== null) {
          functionNames.push(match[1]);
        }
        
        // Match variable function assignments: var functionName = function(...)
        const varFunctionRegex = /var\s+([a-zA-Z_$][a-zA-Z0-9_$]*)\s*=\s*function\s*\(/g;
        while ((match = varFunctionRegex.exec(code)) !== null) {
          functionNames.push(match[1]);
        }
        
        // Match arrow function assignments: var functionName = (...) => 
        const arrowFunctionRegex = /var\s+([a-zA-Z_$][a-zA-Z0-9_$]*)\s*=\s*\([^)]*\)\s*=>/g;
        while ((match = arrowFunctionRegex.exec(code)) !== null) {
          functionNames.push(match[1]);
        }
        
        // Match const/let function assignments: const functionName = function(...)
        const constFunctionRegex = /(?:const|let)\s+([a-zA-Z_$][a-zA-Z0-9_$]*)\s*=\s*function\s*\(/g;
        while ((match = constFunctionRegex.exec(code)) !== null) {
          functionNames.push(match[1]);
        }
        
        // Match const/let arrow function assignments: const functionName = (...) =>
        const constArrowFunctionRegex = /(?:const|let)\s+([a-zA-Z_$][a-zA-Z0-9_$]*)\s*=\s*\([^)]*\)\s*=>/g;
        while ((match = constArrowFunctionRegex.exec(code)) !== null) {
          functionNames.push(match[1]);
        }
        
        // Remove duplicates and return
        return [...new Set(functionNames)];
      }
      
      // Process a single import statement
      function processImport(code, importStatement, functionNames, scriptName) {
        // Find the source script with improved matching
        const sourceScript = allScripts.find(script => {
          // Exact match (highest priority)
          if (script.name === scriptName) return true;
          
          // Filename match (high priority) - check if script has filename property
          if (script.filename && script.filename === scriptName + '.ts') return true;
          
          // Handle @ prefixed names specifically (e.g., "@Variables" matches "Example Scripts / @Variables")
          if (scriptName.startsWith('@')) {
            // Check if script name ends with the @-prefixed name
            if (script.name.endsWith(' / ' + scriptName)) return true;
            // Check if script name includes the @-prefixed name
            if (script.name.includes(scriptName)) return true;
            // Check filename for @-prefixed scripts
            if (script.filename && script.filename === scriptName.replace('@', '') + '.ts') return true;
          }
          
          // End-of-name match (e.g., "Replace Styles" matches "Example Scripts / Replace Styles")
          if (script.name.endsWith(' / ' + scriptName)) return true;
          
          // Case insensitive end-of-name match
          if (script.name.toLowerCase().endsWith(' / ' + scriptName.toLowerCase())) return true;
          
          // Partial match (lowest priority - only if no better match found)
          if (script.name.includes(scriptName)) return true;
          
          return false;
        });
        
        if (sourceScript) {
          console.log('🔗 Runtime import: ' + functionNames.join(', ') + ' from ' + sourceScript.name);
          
          // Unescape the source code (convert \n to actual newlines, etc.)
          const unescapedCode = sourceScript.code.replace(/\\n/g, '\n').replace(/\\"/g, '"').replace(/\\\\/g, '\\');
          
          
          // Extract and inject the needed functions
          const extractedFunctions = extractFunctionsFromCode(unescapedCode, functionNames);
          
          // Replace the @import statement with the extracted functions
          const injectedCode = '// Runtime imported from: ' + sourceScript.name + '\n' + 
                             extractedFunctions + '\n';
          
          return code.replace(importStatement, injectedCode);
        } else {
          console.warn('⚠️ Script not found for import: ' + scriptName);
          figma.notify('Import failed: Script "' + scriptName + '" not found');
          // Remove the failed import statement
          return code.replace(importStatement, '// Import failed: ' + scriptName + ' not found');
        }
      }
      
      // Extract specific functions from code with recursive dependency extraction
      function extractFunctionsFromCode(sourceCode, functionNames, extractedSet = new Set(), depth = 0) {
        // Prevent infinite recursion
        if (depth > 10) {
          console.warn('⚠️ Maximum dependency depth reached');
          return '';
        }
        
        let extractedCode = '';
        const newFunctionsToExtract = [];
        
        functionNames.forEach(functionName => {
          // Skip if already extracted
          if (extractedSet.has(functionName)) {
            return;
          }
          
          // Use a more robust approach that finds the function start and then balances braces
          const functionStartPattern = new RegExp(`function\\s+${functionName}\\s*\\(`, 'g');
          let match;
          
          while ((match = functionStartPattern.exec(sourceCode)) !== null) {
            const startIndex = match.index;
            const functionStart = match[0];
            
            // Find the opening brace after the parameters
            let braceIndex = startIndex + functionStart.length;
            let parenCount = 1; // We're already inside the opening paren
            
            // Skip the parameter list
            while (braceIndex < sourceCode.length && parenCount > 0) {
              if (sourceCode[braceIndex] === '(') parenCount++;
              else if (sourceCode[braceIndex] === ')') parenCount--;
              braceIndex++;
            }
            
            // Skip whitespace to find the opening brace
            while (braceIndex < sourceCode.length && /\s/.test(sourceCode[braceIndex])) {
              braceIndex++;
            }
            
            if (braceIndex < sourceCode.length && sourceCode[braceIndex] === '{') {
              // Now find the matching closing brace
              let braceCount = 1;
              let endIndex = braceIndex + 1;
              
              while (endIndex < sourceCode.length && braceCount > 0) {
                if (sourceCode[endIndex] === '{') braceCount++;
                else if (sourceCode[endIndex] === '}') braceCount--;
                endIndex++;
              }
              
              if (braceCount === 0) {
                const functionCode = sourceCode.substring(startIndex, endIndex);
                const functionBody = sourceCode.substring(braceIndex + 1, endIndex - 1);
                
                // Mark as extracted
                extractedSet.add(functionName);
                
                // Find all function calls in the function body
                const dependencies = findFunctionCallsInCode(functionBody, sourceCode);
                
                // Add dependencies to extraction queue
                dependencies.forEach(dep => {
                  if (!extractedSet.has(dep)) {
                    newFunctionsToExtract.push(dep);
                  }
                });
                
                extractedCode += functionCode + '\n\n';
                break; // Found the function, move to next function name
              }
            }
          }
        });
        
        // Recursively extract dependencies
        if (newFunctionsToExtract.length > 0) {
          const dependencyCode = extractFunctionsFromCode(sourceCode, newFunctionsToExtract, extractedSet, depth + 1);
          // Dependencies go before the functions that depend on them
          extractedCode = dependencyCode + extractedCode;
        }
        
        return extractedCode;
      }
      
      // Find all function calls in code that are defined in the same source
      function findFunctionCallsInCode(code, sourceCode) {
        const dependencies = new Set();
        
        // Get all function names defined in the source code
        const definedFunctions = new Set();
        const functionDefRegex = /function\s+(\w+)\s*\(/g;
        let match;
        while ((match = functionDefRegex.exec(sourceCode)) !== null) {
          definedFunctions.add(match[1]);
        }
        
        // Find function calls in the code
        // Pattern: functionName( or functionName (with potential whitespace)
        const functionCallRegex = /\b(\w+)\s*\(/g;
        while ((match = functionCallRegex.exec(code)) !== null) {
          const functionName = match[1];
          
          // Skip common built-ins and keywords
          const builtIns = new Set([
            'console', 'figma', 'if', 'for', 'while', 'switch', 'case', 'return',
            'var', 'let', 'const', 'function', 'typeof', 'instanceof', 'new',
            'Array', 'Object', 'String', 'Number', 'Boolean', 'Date', 'Math',
            'parseInt', 'parseFloat', 'isNaN', 'isFinite', 'JSON', 'Promise',
            'setTimeout', 'setInterval', 'clearTimeout', 'clearInterval'
          ]);
          
          if (!builtIns.has(functionName) && definedFunctions.has(functionName)) {
            dependencies.add(functionName);
          }
        }
        
        return Array.from(dependencies);
      }

      // Run current script
      function runCurrentScript() {
        let scriptCode = getFullCode();
        if (scriptCode.trim()) {
          // Process runtime imports before execution
          scriptCode = processRuntimeImports(scriptCode);
          post('RUN', { code: scriptCode });
        }
      }

      // Export current script
      function exportCurrentScript() {
        if (!currentScript) return;
        
        const scriptData = {
          name: currentScript.name,
          code: getFullCode(),
          type: currentScript.type
        };
        
        const dataStr = JSON.stringify(scriptData, null, 2);
        const dataBlob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(dataBlob);
        
        const link = document.createElement('a');
        link.href = url;
        link.download = `${currentScript.name.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.json`;
        link.click();
        
        URL.revokeObjectURL(url);
        post('NOTIFY', { message: `Exported: ${currentScript.name}` });
      }

      // Import script
      function importScript() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = (e) => {
          const file = e.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
              try {
                const scriptData = JSON.parse(e.target.result);
                
                // Validate script data
                if (!scriptData.name || !scriptData.code) {
                  post('NOTIFY', { message: 'Invalid script file format' });
                  return;
                }
                
                // Check for duplicates
                if (allScripts.some(s => s.name === scriptData.name)) {
                  post('NOTIFY', { message: 'A script with that name already exists' });
                  return;
                }
                
                // Add to scripts
                const newScript = {
                  name: scriptData.name,
                  code: scriptData.code,
                  type: 'user'
                };
                
                allScripts.push(newScript);
                userScripts.push(newScript);
                
                // Save to storage
                post('SAVE', newScript);
                
                // Select the imported script
                selectScriptDirectly(newScript);
                updateScriptList(searchInput.value);
                
                post('NOTIFY', { message: `Imported: ${scriptData.name}` });
              } catch (error) {
                post('NOTIFY', { message: 'Error reading script file' });
              }
            };
            reader.readAsText(file);
          }
        };
        input.click();
      }

      // Export all user scripts
      function exportAllUserScripts() {
        const userScriptsData = allScripts.filter(s => s.type === 'user');
        
        if (userScriptsData.length === 0) {
          post('NOTIFY', { message: 'No user scripts to export' });
          return;
        }
        
        const dataStr = JSON.stringify(userScriptsData, null, 2);
        const dataBlob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(dataBlob);
        
        const link = document.createElement('a');
        link.href = url;
        link.download = 'codefig_user_scripts.json';
        link.click();
        
        URL.revokeObjectURL(url);
        post('NOTIFY', { message: `Exported ${userScriptsData.length} user scripts` });
      }

      // Initialize resizing functionality
      function initResizing() {
        resizer.addEventListener('mousedown', (e) => {
          isResizing = true;
          startX = e.clientX;
          startWidth = sidebar.offsetWidth;
          resizer.classList.add('resizing');
          document.addEventListener('mousemove', handleResize);
          document.addEventListener('mouseup', stopResize);
          e.preventDefault();
        });
      }

      function handleResize(e) {
        if (!isResizing) return;
        
        const deltaX = e.clientX - startX;
        const newWidth = Math.max(200, Math.min(400, startWidth + deltaX));
        sidebar.style.width = newWidth + 'px';
        
        // Refresh CodeMirror after resize
        setTimeout(() => {
          code.refresh();
          code.setSize(null, '100%');
          if (configEditor) { configEditor.refresh(); configEditor.setSize(null, '100%'); }
        }, 0);
      }

      function stopResize() {
        isResizing = false;
        resizer.classList.remove('resizing');
        document.removeEventListener('mousemove', handleResize);
        document.removeEventListener('mouseup', stopResize);
        
        // Final CodeMirror refresh
        setTimeout(() => {
          code.refresh();
          code.setSize(null, '100%');
          if (configEditor) { configEditor.refresh(); configEditor.setSize(null, '100%'); }
        }, 0);
      }

      // ============================================================================
      // WINDOW MEMORY FUNCTIONALITY
      // ============================================================================

      function saveWindowMemory() {
        try {
          const memory = {
            width: window.innerWidth,
            height: window.innerHeight,
            timestamp: Date.now()
          };
          
          // Use a simple approach - store in a global variable and send to backend
          window._codefigWindowMemory = memory;
          
          // Send to backend for persistence
          parent.postMessage({
            pluginMessage: {
              type: 'SAVE_WINDOW_MEMORY',
              memory: memory
            }
          }, '*');
          
          console.log('💾 Window memory saved:', memory);
        } catch (e) {
          console.warn('Failed to save window memory:', e);
        }
      }

      function loadWindowMemory() {
        try {
          // Check if we have memory from backend
          if (window._codefigWindowMemory) {
            const memory = window._codefigWindowMemory;
            
            // Check if memory is not too old (7 days)
            const maxAge = 7 * 24 * 60 * 60 * 1000; // 7 days in milliseconds
            if (Date.now() - memory.timestamp > maxAge) {
              console.log('⏰ Window memory too old, ignoring');
              return null;
            }
            
            console.log('📂 Window memory loaded:', memory);
            return memory;
          }
          
          console.log('❌ No window memory found');
          return null;
        } catch (e) {
          console.warn('Failed to load window memory:', e);
          return null;
        }
      }

      function restoreWindowSize() {
        console.log('🔄 Attempting to restore window size...');
        const memory = loadWindowMemory();
        if (!memory) {
          console.log('❌ No memory to restore');
          return;
        }
        
        // Validate window size is reasonable
        const minWidth = 800;
        const maxWidth = 2000;
        const minHeight = 400;
        const maxHeight = 1200;
        
        const width = Math.max(minWidth, Math.min(maxWidth, memory.width));
        const height = Math.max(minHeight, Math.min(maxHeight, memory.height));
        
        console.log('📏 Current size:', window.innerWidth, 'x', window.innerHeight);
        console.log('📏 Saved size:', memory.width, 'x', memory.height);
        console.log('📏 Target size:', width, 'x', height);
        
        // Only restore if size changed significantly
        if (Math.abs(width - window.innerWidth) > 50 || 
            Math.abs(height - window.innerHeight) > 50) {
          
          console.log('✅ Restoring window size:', { width, height });
          
          // Send restore message to backend
          parent.postMessage({
            pluginMessage: {
              type: 'RESTORE_WINDOW',
              width: width,
              height: height
            }
          }, '*');
        } else {
          console.log('ℹ️ Window size is already correct, no need to restore');
        }
      }

      // ============================================================================
      // WINDOW RESIZING FUNCTIONALITY
      // ============================================================================

      function initWindowResizing() {
        // Right edge resize (width only)
        resizeHandleRight.addEventListener('mousedown', (e) => {
          isWindowResizing = true;
          resizeType = 'width';
          startWindowX = e.clientX;
          startWindowWidth = window.innerWidth;
          document.body.classList.add('resizing');
          document.addEventListener('mousemove', handleWindowResize);
          document.addEventListener('mouseup', stopWindowResize);
          e.preventDefault();
        });

        // Bottom edge resize (height only)
        resizeHandleBottom.addEventListener('mousedown', (e) => {
          isWindowResizing = true;
          resizeType = 'height';
          startWindowY = e.clientY;
          startWindowHeight = window.innerHeight;
          document.body.classList.add('resizing');
          document.addEventListener('mousemove', handleWindowResize);
          document.addEventListener('mouseup', stopWindowResize);
          e.preventDefault();
        });

        // Corner resize (both width and height)
        resizeHandleCorner.addEventListener('mousedown', (e) => {
          isWindowResizing = true;
          resizeType = 'both';
          startWindowX = e.clientX;
          startWindowY = e.clientY;
          startWindowWidth = window.innerWidth;
          startWindowHeight = window.innerHeight;
          document.body.classList.add('resizing');
          document.addEventListener('mousemove', handleWindowResize);
          document.addEventListener('mouseup', stopWindowResize);
          e.preventDefault();
        });
      }

      function handleWindowResize(e) {
        if (!isWindowResizing) return;

        let newWidth = startWindowWidth;
        let newHeight = startWindowHeight;

        if (resizeType === 'width' || resizeType === 'both') {
          const deltaX = e.clientX - startWindowX;
          newWidth = Math.max(800, Math.min(2000, startWindowWidth + deltaX));
        }

        if (resizeType === 'height' || resizeType === 'both') {
          const deltaY = e.clientY - startWindowY;
          newHeight = Math.max(400, Math.min(1200, startWindowHeight + deltaY));
        }

        // Throttle to ~60fps to reduce position jumping
        const now = Date.now();
        if (now - lastResizeTime < 16) return;
        lastResizeTime = now;

        // Send resize message to backend
        parent.postMessage({
          pluginMessage: {
            type: 'RESIZE_WINDOW',
            width: newWidth,
            height: newHeight
          }
        }, '*');
      }

      function stopWindowResize() {
        isWindowResizing = false;
        resizeType = null;
        document.body.classList.remove('resizing');
        document.removeEventListener('mousemove', handleWindowResize);
        document.removeEventListener('mouseup', stopWindowResize);
        
        // Save window memory after resize is complete
        setTimeout(() => {
          saveWindowMemory();
        }, 100);
      }

      // Toggle section collapse/expand
      function toggleSection(sectionId) {
        const contentElement = document.getElementById(`content-${sectionId}`);
        const toggleElement = document.querySelector(`[onclick="toggleSection('${sectionId}')"] .section-toggle`);
        
        if (!contentElement || !toggleElement) return;
        
        const isCollapsed = collapsedSections.has(sectionId);
        
        if (isCollapsed) {
          // Expand
          collapsedSections.delete(sectionId);
          contentElement.classList.remove('collapsed');
          toggleElement.classList.remove('collapsed');
          
          // Remove max-height to allow full expansion
          contentElement.style.maxHeight = 'none';
          
          // Store expanded state
          post('SAVE_COLLAPSED_SECTIONS', { collapsedSections: [...collapsedSections] });
        } else {
          // Collapse
          collapsedSections.add(sectionId);
          contentElement.classList.add('collapsed');
          toggleElement.classList.add('collapsed');
          contentElement.style.maxHeight = '0';
          
          // Store collapsed state
          post('SAVE_COLLAPSED_SECTIONS', { collapsedSections: [...collapsedSections] });
        }
      }
      
      // Load collapsed sections from figma.clientStorage
      function loadCollapsedSections() {
        post('LOAD_COLLAPSED_SECTIONS');
      }
      

      // Initialize keyboard shortcuts
      function initKeyboardShortcuts() {
        document.addEventListener('keydown', (e) => {
          if (e.metaKey || e.ctrlKey) {
            switch (e.key) {
              case 'r':
                e.preventDefault();
                runCurrentScript();
                break;
              case 'e':
                e.preventDefault();
                exportCurrentScript();
                break;
              case 'i':
                e.preventDefault();
                importScript();
                break;
              case 'n':
                e.preventDefault();
                createNewScript();
                break;
              case '/':
                e.preventDefault();
                toggleLineComments();
                break;
            }
          }
        });
      }

      // Toggle line comments for selected lines in CodeMirror
      function toggleLineComments() {
        // Determine which editor is active
        const activeEditor = currentTab === 'config' ? configEditor : code;
        if (!activeEditor) return;

        const doc = activeEditor.getDoc();
        const selections = doc.listSelections();

        activeEditor.operation(() => {
          for (const selection of selections) {
            const from = selection.from();
            const to = selection.to();
            const startLine = from.line;
            const endLine = to.line;

            // Get all lines in the selection
            const lines = [];
            for (let i = startLine; i <= endLine; i++) {
              lines.push({
                lineNum: i,
                text: doc.getLine(i)
              });
            }

            // Check if all non-empty lines are commented
            const nonEmptyLines = lines.filter(l => l.text.trim().length > 0);
            const allCommented = nonEmptyLines.length > 0 && nonEmptyLines.every(l => 
              l.text.trimStart().startsWith('//')
            );

            if (allCommented) {
              // Uncomment all lines
              for (const line of lines) {
                const trimmedStart = line.text.length - line.text.trimStart().length;
                const afterTrim = line.text.trimStart();
                
                if (afterTrim.startsWith('// ')) {
                  // Remove "// " (with space)
                  const newText = line.text.substring(0, trimmedStart) + afterTrim.substring(3);
                  doc.replaceRange(newText, 
                    { line: line.lineNum, ch: 0 }, 
                    { line: line.lineNum, ch: line.text.length }
                  );
                } else if (afterTrim.startsWith('//')) {
                  // Remove "//" (without space)
                  const newText = line.text.substring(0, trimmedStart) + afterTrim.substring(2);
                  doc.replaceRange(newText, 
                    { line: line.lineNum, ch: 0 }, 
                    { line: line.lineNum, ch: line.text.length }
                  );
                }
              }
            } else {
              // Comment all lines
              for (const line of lines) {
                const trimmedStart = line.text.length - line.text.trimStart().length;
                const newText = line.text.substring(0, trimmedStart) + '// ' + line.text.substring(trimmedStart);
                doc.replaceRange(newText, 
                  { line: line.lineNum, ch: 0 }, 
                  { line: line.lineNum, ch: line.text.length }
                );
              }
            }
          }
        });
      }

      // Focus the search input
      function focusSearch() {
        searchInput.focus();
        searchInput.select();
      }

      // Handle title editing
      function initTitleEditing() {
        scriptTitle.addEventListener('click', () => {
          if (!currentScript || currentScript.type !== 'user' || !scriptTitle.classList.contains('editable')) return;
          
          const originalText = scriptTitle.textContent;
          scriptTitle.contentEditable = true;
          scriptTitle.classList.add('editing');
          scriptTitle.focus();
          
          // Select all text
          const range = document.createRange();
          range.selectNodeContents(scriptTitle);
          const selection = window.getSelection();
          selection.removeAllRanges();
          selection.addRange(range);
          
          function finishEditing(save = false) {
            scriptTitle.contentEditable = false;
            scriptTitle.classList.remove('editing');
            
            if (save) {
              const newName = scriptTitle.textContent.trim();
              if (newName && newName !== originalText) {
                // Check for duplicates
                if (allScripts.some(s => s.name === newName && s !== currentScript)) {
                  post('NOTIFY', { message: 'A script with that name already exists' });
                  scriptTitle.textContent = originalText;
                  return;
                }
                
                // Normalize the name if it contains a slash
                const slashMatch = newName.match(/^(.+?)\s*\/\s*(.+)$/);
                const normalizedName = slashMatch ? `${slashMatch[1].trim()} / ${slashMatch[2].trim()}` : newName;
                
                // Update script name
                currentScript.name = normalizedName;
                post('SAVE', {
                  name: normalizedName,
                  oldName: originalText,
                  code: currentScript.code,
                  type: 'user'
                });
                // Update last opened script with new name
                post('SET_LAST_OPENED', { name: normalizedName, scriptType: 'user' });
                updateScriptList(searchInput.value);
                // post('NOTIFY', { message: `Renamed to: ${newName}` });
              }
            } else {
              scriptTitle.textContent = originalText;
            }
          }
          
          scriptTitle.addEventListener('blur', () => finishEditing(true), { once: true });
          const handleKeyDown = (e) => {
            if (e.key === 'Enter') {
              e.preventDefault();
              finishEditing(true);
              scriptTitle.removeEventListener('keydown', handleKeyDown);
            } else if (e.key === 'Escape') {
              e.preventDefault();
              finishEditing(false);
              scriptTitle.removeEventListener('keydown', handleKeyDown);
            }
          };
          
          scriptTitle.addEventListener('keydown', handleKeyDown);
        });
      }

      // Handle window resize
      function initWindowResize() {
        window.addEventListener('resize', () => {
          setTimeout(() => {
            code.refresh();
            code.setSize(null, '100%');
          }, 0);
        });
      }

      // Initialize info panel state
      function initInfoPanel() {
        // Panel states will be restored when needed
        // We can't access figma.clientStorage from UI context
        // State restoration happens through message passing if needed
      }

      // Event listeners
      newScriptBtn.addEventListener('click', createNewScript);
      runBtn.addEventListener('click', runCurrentScript);
      deleteBtn.addEventListener('click', deleteCurrentScript);
      exportBtn.addEventListener('click', exportCurrentScript);
      importBtn.addEventListener('click', importScript);
      infoPanelBtn.addEventListener('click', toggleInfoPanel);
      exportAllBtn.addEventListener('click', exportAllUserScripts);

      // Editor tab clicks
      if (editorTabsEl) {
        editorTabsEl.addEventListener('click', (e) => {
          const tab = e.target.closest('.editor-tab');
          if (tab && tab.getAttribute('data-tab')) {
            switchTab(tab.getAttribute('data-tab'));
          }
        });
      }

      // Search functionality
      searchInput.addEventListener('input', (e) => {
        updateScriptList(e.target.value);
      });

      // Code change detection (main script editor)
      code.on('change', () => {
        debugLog('Code change detected');
        updateButtonStates();
        scheduleAutosave();
        
        // Check if @InfoPanel is now being used
        const currentCode = code.getValue();
        const newInfoPanelAvailable = checkInfoPanelAvailability(currentCode);
        if (newInfoPanelAvailable !== infoPanelAvailable) {
          infoPanelAvailable = newInfoPanelAvailable;
          updateInfoPanelButtonVisibility();
        }
      });

      // Config editor change (when script has config tab)
      if (configEditor) {
        configEditor.on('change', () => {
          updateButtonStates();
          scheduleAutosave();
        });
      }

      // Message handling
        window.onmessage = (event) => {
          const msg = event.data.pluginMessage;
          if (!msg) return;
          
          console.log('UI: Received message type:', msg.type);
          
          switch (msg.type) {
          case 'EXAMPLE_SCRIPTS':
            debugLog('Received example scripts:', msg.items);
            
            prebuiltScripts = msg.items.map(script => ({
              name: script.name || 'Unnamed',
              code: script.code || '',
              type: script.type || 'prebuilt'
            }));
            allScripts = [...prebuiltScripts, ...userScripts];
            updateScriptList();
            break;
            
          case 'LIST':
            debugLog('Received user scripts:', msg.items);
            debugLog('Last opened script:', msg.lastOpenedScript);
            
            userScripts = msg.items.map(script => ({
              name: script.name || 'Unnamed',
              code: script.code || '',
              type: 'user'
            }));
            allScripts = [...prebuiltScripts, ...userScripts];
            updateScriptList();
            
            // Open the last opened script or default to Help & Documentation
            // Add a small delay to ensure everything is fully initialized
            setTimeout(() => {
              openInitialScript(msg.lastOpenedScript);
            }, 50);
            break;
            
          case 'COLLAPSED_SECTIONS':
            collapsedSections = new Set(msg.collapsedSections || []);
            // Update the script list to apply the collapsed state
            updateScriptList();
            break;
            
            case 'SAVE_CONFIRMED':
            debugLog('Save confirmed for:', msg.scriptData.name);
            // Immediately add/update the script in allScripts so it's available for import
            if (msg.scriptData) {
              // Get the current code from the editor if scriptData doesn't have it
              const scriptCode = msg.scriptData.code || (currentScript && currentScript.code) || getFullCode() || '';
              
              const existingIndex = allScripts.findIndex(s => s.name === msg.scriptData.name && s.type === 'user');
              if (existingIndex >= 0) {
                // Update existing script
                allScripts[existingIndex] = {
                  name: msg.scriptData.name,
                  code: scriptCode,
                  type: 'user'
                };
              } else {
                // Add new script
                allScripts.push({
                  name: msg.scriptData.name,
                  code: scriptCode,
                  type: 'user'
                });
              }
              // Update userScripts array as well
              userScripts = allScripts.filter(s => s.type === 'user');
              debugLog('Script added to allScripts for immediate import availability:', msg.scriptData.name);
            }
            break;
            
          case 'SAVE_FAILED':
            debugError('Save failed for:', msg.scriptName, msg.error);
            post('NOTIFY', { message: `Failed to save script: ${msg.error}` });
            break;
            
          case 'INFO_PANEL_RESULTS':
            console.log('UI: Received INFO_PANEL_RESULTS message:', msg);
            displayInfoResults(msg);
            break;
            
          case 'INFO_PANEL_SUCCESS':
            console.log('UI: Received INFO_PANEL_SUCCESS message:', msg);
            // Only update if panel is currently open
            if (infoPanel.classList.contains('open')) {
              console.log('UI: Panel is open, showing success message');
              displayInfoResults(msg);
            } else {
              console.log('UI: Panel is closed, ignoring success message');
            }
            break;
            
          case 'PROGRESS_RESET':
            console.log('UI: Received progress reset');
            hideProgress();
            break;
            
          case 'PROGRESS_UPDATE':
            console.log('UI: Received progress update:', msg);
            updateProgress(msg.operation, msg.processed, msg.total, msg.percentage);
            break;
            
          case 'PROGRESS_COMPLETE':
            console.log('UI: Progress complete:', msg);
            hideProgress();
            break;

          case 'CONSOLE_FORWARD':
            (function () {
              const level = msg.level || 'log';
              const payload = msg.payload != null ? String(msg.payload) : '';
              const line = '[' + new Date().toISOString() + '] [' + level.toUpperCase() + '] ' + payload + '\n';
              console.log('📤 UI: Forwarding to console server:', line.substring(0, 100));
              fetch('http://localhost:8765', {
                method: 'POST',
                body: line,
                headers: { 'Content-Type': 'text/plain; charset=utf-8' }
              })
              .then(() => console.log('✅ Console forward successful'))
              .catch((err) => console.error('❌ Console forward failed:', err));
            })();
            break;
            
          case 'WINDOW_MEMORY_LOADED':
            console.log('📥 UI: Window memory loaded from backend:', msg);
            // Store the loaded memory and restore window size with minimal delay
            window._codefigWindowMemory = msg.memory;
            setTimeout(() => {
              restoreWindowSize();
            }, 10);
            break;
        }
      };

      // === PROGRESS INDICATOR FUNCTIONS ===
      
        function updateProgress(operation, processed, total, percentage) {
          const progressIndicator = document.getElementById('progressIndicator');
          const progressFill = document.getElementById('progressFill');
          const progressText = document.getElementById('progressText');
          
          // Add timestamp logging
          var timestamp = new Date().toISOString().substr(11, 12); // HH:MM:SS.mmm
          console.log('[' + timestamp + '] UI Progress update: ' + operation + ' - ' + processed + '/' + total + ' (' + percentage + '%)');
          
          if (progressIndicator && progressFill && progressText) {
            // Show progress indicator
            progressIndicator.style.display = 'flex';
            
            // Update progress bar - use pixel width instead of percentage
            var progressBarContainer = progressIndicator.querySelector('.progress-bar');
            var containerWidth = progressBarContainer.clientWidth;
            
            // Fallback if containerWidth is 0 (element not yet rendered)
            if (containerWidth === 0) {
              // Force a reflow and try again
              progressBarContainer.offsetHeight;
              containerWidth = progressBarContainer.clientWidth;
            }
            
            // If still 0, use percentage as fallback
            if (containerWidth === 0) {
              progressFill.style.width = percentage + '%';
            } else {
              var fillWidth = Math.round((containerWidth * percentage) / 100);
              progressFill.style.width = fillWidth + 'px';
            }
            
            // Update text
            const elapsed = Date.now() - (window.progressStartTime || Date.now());
            const estimated = processed > 0 ? Math.round((elapsed / processed) * (total - processed)) : 0;
            
            let message = operation + ': ' + processed + '/' + total + ' (' + percentage + '%)';
            if (estimated > 0) {
              const formatTime = function(ms) {
                if (ms < 1000) return ms + 'ms';
                if (ms < 60000) return Math.round(ms / 1000) + 's';
                return Math.round(ms / 60000) + 'm ' + Math.round((ms % 60000) / 1000) + 's';
              };
              message += ' - ETA: ' + formatTime(estimated);
            }
            
            progressText.textContent = message;
          }
        }
      
      function hideProgress() {
        const progressIndicator = document.getElementById('progressIndicator');
        if (progressIndicator) {
          progressIndicator.style.display = 'none';
        }
        // Reset progress state
        window.progressStartTime = null;
      }
      
      function showProgress(operation, processed, total) {
        if (!window.progressStartTime) {
          window.progressStartTime = Date.now();
        }
        const percentage = total > 0 ? Math.round((processed / total) * 100) : 0;
        updateProgress(operation, processed, total, percentage);
      }

      // Initialize everything
      function init() {
        debugLog('Initializing CodeFig...');
        
        // Load window memory from backend FIRST, before any UI rendering
        parent.postMessage({
          pluginMessage: {
            type: 'LOAD_WINDOW_MEMORY'
          }
        }, '*');
        
        // Initialize info panel button as hidden initially
        initializeInfoPanel();
        
        // Load collapsed sections state
        loadCollapsedSections();
        
        // Populate initial scripts (build process includes all scripts in prebuiltScripts)
        allScripts = [...prebuiltScripts];
        updateScriptList();
        
        // Initialize features
        initResizing();
        initWindowResizing();
        initKeyboardShortcuts();
        initTitleEditing();
        initWindowResize();
        initInfoPanel();
        
        
        // Save window memory when page is about to unload
        window.addEventListener('beforeunload', () => {
          saveWindowMemory();
        });
        
        // Read scripts from embedded script tag and send to backend
        const scriptsScript = document.getElementById('scripts-data');
        if (scriptsScript) {
          try {
            // Get the base64 encoded content
            const scriptsBase64 = scriptsScript.textContent || scriptsScript.innerText || '';
            // Decode from base64 with proper UTF-8 handling
            // atob() returns a binary string, we need to convert it to UTF-8
            const binaryString = atob(scriptsBase64);
            // Convert binary string to UTF-8 using TextDecoder
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
              bytes[i] = binaryString.charCodeAt(i);
            }
            const scriptsText = new TextDecoder('utf-8').decode(bytes);
            // Parse the JSON
            const scripts = JSON.parse(scriptsText);
            // Send scripts to backend
            post('SET_SCRIPTS', { scripts: scripts });
            debugLog('Sent scripts to backend:', scripts.length, 'scripts');
          } catch (e) {
            console.error('Failed to parse scripts from UI HTML:', e);
          }
        } else {
          console.error('Scripts script tag not found in HTML');
        }
        
        // Load example scripts and user scripts
        post('LOAD_EXAMPLE_SCRIPTS');
        post('LIST');
        
        debugLog('CodeFig initialized successfully');
      }

      // Init is now called after CodeMirror is ready (see above)
    </script>
  </body>
