<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/default.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; padding: 0; font: 12px system-ui; height: 100vh; display: flex; }
      
      /* Resizable container */
      .resizable-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        position: relative;
        overflow: hidden;
        width: 100%;
      }
      
      .main-container {
        display: flex;
        flex: 1;
        overflow: hidden;
      }
      
      /* Resizer */
      .resizer {
        width: 1px;
        /* background: #e1e5e9; */
        cursor: col-resize;
        position: relative;
        flex-shrink: 0;
        transition: background-color 0.2s ease;
      }
      
      .resizer:hover {
        background: #007AFF;
      }
      
      .resizer::before {
        content: '';
        position: absolute;
        left: -4px;
        right: -4px;
        top: 0;
        bottom: 0;
        background: transparent;
      }
      
      .resizing {
        background: #007AFF !important;
      }
      
      /* Sidebar */
      .sidebar { 
        width: 240px; 
        min-width: 200px;
        max-width: 400px;
        background: #fff; 
        display: flex; 
        flex-direction: column;
        overflow: hidden;
      }
      
      .sidebar-header { 
        padding: 0px;
        border-bottom: 1px solid #e6e6e6; 
        background: #fff;
      }
      
      .search-container {
        position: relative;
      }
      
      .search-input {
        padding: 12px 20px 12px 20px; 
        width: 100%;
        height: 56px;
        border-radius: 6px;
        font: 11px system-ui;
        font-weight: 600;
        outline: none;
        transition: all 0.2s ease;
        border: none;
      }
      
      
      .search-input::placeholder {
        color: #000;
        opacity: 0.5;
        font-weight: 600;
      }
      
      .plugin-footer {
        padding: 12px 20px;
        border-top: 1px solid #e6e6e6;
        background: #fff;
        display: flex;
        flex-direction: row;
        gap: 12px;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        position: relative;
        flex-shrink: 0;
      }
      
      .footer-left {
        display: flex;
        gap: 12px;
      }
      
      .footer-right {
        display: flex;
        gap: 12px;
      }
      
      
      .script-section {
        margin-bottom: 0;
      }
      
      .script-section:not(:last-child) {
        margin-bottom: 20px;
      }
      
      .script-list { 
        flex: 1; 
        overflow-y: auto; 
      }
      
      .script-list .divider {
        height: 1px;
        background: #e5e5e5;
      }

      /* Script list structure */
      .system-scripts {
        padding: 12px 0;
      }
      
      .user-scripts {
        padding: 12px 0;
      }
      
      .section-header {
        padding: 12px 20px 6px 20px;
        font: 9px system-ui;
        font-weight: 600;
        color: #808080;
        /* letter-spacing: -0.22px; */
        background: transparent;
      }
      
      .section-header.example-scripts, .section-header.user-scripts {
        /* font: 9px system-ui; */
        /* font-weight: 500; */
        /* letter-spacing: -0.08px; */
        /* text-transform: uppercase; */
        /* color: #6D6D6D; */
        /* padding: 12px 20px 6px 20px; */
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 4px;
        transition: all 0.2s ease;
        user-select: none;
      }
      
      .section-header.example-scripts:hover, .section-header.user-scripts:hover {
        color: #8a8a8a;
      }
      
      .section-header.selected {
        background: #FAFAFA;
      }
      
      .section-header.hidden {
        display: none;
      }
      
      .section-toggle {
        width: 12px;
        height: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
        opacity: 0.6;
        flex-shrink: 0;
      }
      
      .section-toggle svg {
        width: 12px;
        height: 12px;
      }
      
      .chevron-expanded {
        display: block;
      }
      
      .chevron-collapsed {
        display: none;
      }
      
      .section-toggle.collapsed .chevron-expanded {
        display: none;
      }
      
      .section-toggle.collapsed .chevron-collapsed {
        display: block;
      }
      
      /* Script groups styling */
      .script-group {
        margin-bottom: 0;
      }
      
      .group-header {
        font: 11px system-ui;
        font-weight: 500;
        /* text-transform: uppercase; */
        color: #6D6D6D;
        padding: 12px 20px 8px 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 4px;
        transition: all 0.2s ease;
        user-select: none;
      }
      
      .group-header.selected {
        background: #FAFAFA;
      }
      
      .script-group.selected {
        background: #FAFAFA;
      }
      
      .script-group.selected .group-content {
        background: #FAFAFA;
      }
      
      .group-header:hover {
        color: #8a8a8a;
      }
      
      .group-content {
        overflow: hidden;
        transition: max-height 0.3s ease-out;
      }
      
      .group-content.collapsed {
        max-height: 0;
      }
      
      .group-content:not(.collapsed) {
        max-height: none;
      }
      
      /* Indented scripts within groups */
      .script-item.grouped {
        padding-left: 36px;
      }

      /* .script-item.user-script {
        color: #007AFF;
      } */

      /* Breadcrumb in header */
      .script-breadcrumb {
        font-size: 12px;
        color: #86868b;
        margin-right: 8px;
      }
      
      .section-content {
        overflow: hidden;
        transition: max-height 0.3s ease-out;
      }
      
      .section-content.collapsed {
        max-height: 0;
      }
      
      .section-content:not(.collapsed) {
        max-height: none;
      }
      
      .section-content.selected {
        background: #FAFAFA;
      }
      
      .script-item { 
        padding: 8px 20px;
        cursor: pointer; 
        display: flex;
        align-items: center;
        font: 11px system-ui;
        font-weight: 400;
        color: #000;
        /* letter-spacing: -0.22px; */
      }
      
      .script-item:hover { background: #FAFAFA; }
      .script-item.active { background: #3b7bef; color: #fff; }
      
      /* System scripts indentation to match grouped scripts */
      .script-item.system-script {
        padding-left: 36px;
      }
      
      .script-item .name {
        flex: 1;
      }
      
      .no-results {
        padding: 20px 12px;
        text-align: center;
        color: #86868b;
        font: 12px system-ui;
        font-style: italic;
      }
      
      /* Main Content */
      .main-content { 
        flex: 1; 
        display: flex; 
        flex-direction: column; 
        overflow: hidden;
        min-width: 300px;
        width: 100%;
      }
      
      .editor-header { 
        padding: 12px 16px 12px 24px; 
        background: #fff; 
        border-bottom: 1px solid #e1e5e9; 
        display: flex; 
        align-items: center; 
        justify-content: space-between;
        width: 100%;
      }
      
      .header-left {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 1;
      }
      
      .script-title { 
        font-size: 14px; 
        font-weight: 600; 
        color: #1d1d1f;
        padding: 4px 8px;
        border-radius: 4px;
        transition: background-color 0.2s ease;
      }
      
      /* Editable title (user scripts only) */
      .script-title.editable {
        cursor: pointer;
      }
      
      .script-title.editable:hover {
        background-color: #f0f0f0;
      }
      
      .script-title.editing {
        background-color: #fff;
        border: 1px solid #007AFF;
        outline: none;
        cursor: text;
      }
      
      .script-status { 
        font-size: 11px; 
        color: #86868b; 
        background: #f5f5f7; 
        padding: 2px 8px; 
        border-radius: 12px;
      }
      
      .header-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      
      .editor-container { 
        flex: 1; 
        overflow: hidden; 
        position: relative;
        width: 100%;
        display: flex;
        flex-direction: column;
      }
      
      .CodeMirror { 
        height: 100%; 
        width: 100%;
        font-size: 12px; 
        border: none;
        background: #fff !important;
      }
      
      .CodeMirror-scroll {
        overflow: auto !important;
      }
      
      .CodeMirror-gutters {
        background: #f8f9fa !important;
        border-right: 1px solid #e1e5e9 !important;
      }
      
      .CodeMirror-linenumber {
        color: #86868b !important;
      }
      
      .CodeMirror-cursor {
        border-left: 1px solid #007AFF !important;
      }
      
      .CodeMirror-selected {
        background: #e8f4fd !important;
      }
      
      /* === BUTTON STYLES === */
      
      /* Base button (no colors) */
      .btn { 
        height: 32px;
        padding: 0 10px; 
        border: 1px solid transparent;
        background: transparent;
        border-radius: 6px; 
        font: 11px system-ui;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        /* letter-spacing: -0.11px; */
      }
      
      /* Button disabled state */
      .btn:disabled { 
        opacity: 0.5; 
        cursor: not-allowed; 
      }
      
      /* === BUTTON VARIANTS === */
      
      /* Primary button (blue) */
      .btn.primary { 
        background: #3b7bef; 
        color: white; 
        border-color: #3b7bef; 
      }
      
      .btn.primary:hover:not(:disabled) { 
        background: #2968d7; 
        border-color: #2968d7;
      }
      
      /* Secondary button (outline) */
      .btn.secondary { 
        background: #fff; 
        color: #333; 
        border-color: #e6e6e6; 
      }
      
      .btn.secondary:hover:not(:disabled) { 
        /* background: #f8f9fa;  */
        border-color: #333; 
      }
      
      /* Danger button (outline with red hover) */
      .btn.danger { 
        background: #fff; 
        color: #333; 
        border-color: #e6e6e6; 
      }
      
      .btn.danger:hover:not(:disabled) { 
        background: #fef2f2; 
        border-color: #ef4444; 
        color: #dc2626;
      }

      /* Button Group Styles */
      .button-group {
        display: flex;
        gap: 4px;
        margin-right: 8px;
      }

      .icon-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        border: none;
        border-radius: 6px;
        background: transparent;
        color: #666;
        cursor: pointer;
        transition: color 0.2s ease;
      }

      .icon-btn:hover {
        color: #333;
      }

      .icon-btn.active {
        color: #3b7bef;
      }

      .action-buttons {
        display: flex;
        gap: 8px;
      }

      /* Editor container needs to be relative for panel positioning */
      .editor-container {
        position: relative;
      }

      /* Info Panel Styles */
      .info-panel {
        position: absolute;
        top: 0;
        right: 0;
        width: 300px;
        height: 100%;
        background: #FAFAFA;
        border-left: 1px solid #e6e6e6;
        transform: translateX(100%);
        transition: transform 0.3s ease;
        z-index: 100;
        overflow: hidden;
      }

      .info-panel.open {
        transform: translateX(0);
      }

      .info-panel-scroll {
        height: 100%;
        overflow-y: auto;
        /* background: #f5f5f5; */
      }

      .info-header {
        padding: 16px 16px 12px 16px;
      }

      .info-title {
        font-size: 16px;
        color: #333;
        font-weight: 600;
        margin: 0;
      }

      .info-filtering {
        padding: 0 16px 12px 16px;
        /* border-bottom: 1px solid #e6e6e6; */
        /* margin-bottom: 12px; */
      }

      .info-filtering:empty {
        display: none;
      }

      .info-list {
        padding: 0 16px 16px 16px;
      }

      .info-placeholder {
        text-align: center;
        color: #999;
        font-size: 14px;
        margin-top: 40px;
      }

      .info-result-item {
        /* padding-left: 8px; */
        /* border-left: 1px solid #e6e6e6; */
        margin-bottom: 8px;
      }

      /* Custom InfoPanel Entry Styles */
      .info-entry {
        display: flex;
        align-items: flex-start;
        /* padding: 12px; */
        /* border: 1px solid #e6e6e6; */
        /* border-radius: 6px; */
        /* background: #fff; */
        margin-bottom: 16px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      /* .info-entry:hover {
        border-color: #0066cc;
        box-shadow: 0 2px 4px rgba(0, 102, 204, 0.1);
      } */

      .info-entry-icon {
        width: 16px;
        height: 16px;
        margin-right: 12px;
        margin-top: 2px;
        flex-shrink: 0;
      }

      .info-entry-content {
        flex: 1;
        min-width: 0;
      }

      .info-entry-title {
        font-weight: 600;
        color: #000;
        font-size: 11px;
        margin-bottom: 4px;
        word-break: break-word;
      }

      .info-entry-count {
        font-size: 11px;
        font-weight: 400;
        color: #808080;
      }

      .info-entry-subtitle {
        font-size: 13px;
        color: #666;
        line-height: 1.4;
      }

      .info-entry-badge {
        display: inline-block;
        padding: 2px 6px;
        border-radius: 3px;
        font-size: 9px;
        font-weight: 500;
        margin-right: 2px;
      }

      .info-entry-badge.error {
        background: #D92637;
        color: #fff;
      }

      .info-entry-badge.warning {
        background: #fff3cd;
        color: #856404;
      }

      .info-entry-badge.success {
        background: #d4edda;
        color: #155724;
      }

      .info-entry-badge.info {
        background: #d1ecf1;
        color: #0c5460;
      }

      /* Category Header Styles */
      .info-category-header {
        display: flex;
        align-items: center;
        padding: 12px 0 8px 0;
        margin-top: 16px;
      }

      .info-category-header:first-child {
        margin-top: 0;
      }

      .info-category-title {
        font-size: 9px;
        font-weight: 500;
        color: #808080;
        text-transform: uppercase;
      }
        /* background: white; */
        cursor: pointer;
        transition: all 0.2s ease;
      }

      /* .info-result-item:hover {
        background: #f5f5f5;
        border-color: #ccc;
      }

      .info-result-item.error {
        border-color: #ef4444;
        background: #fef2f2;
      }

      .info-result-item.warning {
        border-color: #f59e0b;
        background: #fffbeb;
      }

      .info-result-item.success {
        border-color: #10b981;
        background: #ecfdf5;
      } */

      .info-result-message {
        font-size: 11px;
        font-weight: bold;
        color: #333;
        margin-bottom: 4px;
      }
      .info-result-message.error {
        color: #ef4444;
      }

      .info-result-details {
        font-size: 9px;
        color: #666;
      }

      /* Additional styling classes for InfoPanel content */
      .info-result-message .highlight {
        background: #fff3cd;
        padding: 1px 3px;
        border-radius: 2px;
        font-weight: 600;
      }

      .info-result-message .error-text {
        color: #dc3545;
        font-weight: 600;
      }

      .info-result-message .warning-text {
        color: #fd7e14;
        font-weight: 600;
      }

      .info-result-message .success-text {
        color: #198754;
        font-weight: 600;
      }

      .info-result-message .code {
        font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
        background: #f8f9fa;
        padding: 1px 4px;
        border-radius: 3px;
        font-size: 10px;
        border: 1px solid #e9ecef;
      }

      .info-result-message .badge {
        display: inline-block;
        padding: 2px 3px;
        font-size: 9px;
        font-weight: 600;
        line-height: 1;
        text-align: center;
        white-space: nowrap;
        vertical-align: baseline;
        border-radius: 2px;
        margin-right: 4px;
      }

      .info-result-message .badge-error {
        color: #fff;
        background-color: #dc3545;
      }

      .info-result-message .badge-warning {
        color: #000;
        background-color: #ffc107;
      }

      .info-result-message .badge-success {
        color: #fff;
        background-color: #198754;
      }

      .info-result-message .badge-info {
        color: #fff;
        background-color: #0dcaf0;
      }
      
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <div class="resizable-container">
      <div class="main-container">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
          <div class="sidebar-header">
            <div class="search-container">
              <input type="text" id="searchInput" class="search-input" placeholder="Search..." title="Search Scripts (⌘/)">
            </div>
          </div>
          <div class="script-list" id="scriptList">
            <!-- Scripts will be populated here -->
          </div>
        </div>
        
        <!-- Resizer -->
        <div class="resizer" id="resizer"></div>
        
        <!-- Main Content -->
        <div class="main-content">
          <div class="editor-header">
            <div class="header-left">
              <div class="script-title" id="scriptTitle">Select a script</div>
              <div class="script-status" id="scriptStatus">Ready</div>
            </div>
            <div class="header-right">
              <div class="button-group">
                <button class="icon-btn" id="infoPanelBtn" title="Results & Information">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <polyline points="14,2 14,8 20,8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </button>
                <button class="icon-btn" id="maximizeBtn" title="Maximize Window">
                  <svg width="16" height="16" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <g clip-path="url(#clip0_58_779)">
                      <path d="M4 1.5H2.5C2.23478 1.5 1.98043 1.60536 1.79289 1.79289C1.60536 1.98043 1.5 2.23478 1.5 2.5V4M10.5 4V2.5C10.5 2.23478 10.3946 1.98043 10.2071 1.79289C10.0196 1.60536 9.76522 1.5 9.5 1.5H8M8 10.5H9.5C9.76522 10.5 10.0196 10.3946 10.2071 10.2071C10.3946 10.0196 10.5 9.76522 10.5 9.5V8M1.5 8V9.5C1.5 9.76522 1.60536 10.0196 1.79289 10.2071C1.98043 10.3946 2.23478 10.5 2.5 10.5H4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                    </g>
                    <defs>
                      <clipPath id="clip0_58_779">
                        <rect width="12" height="12" fill="white"/>
                      </clipPath>
                    </defs>
                  </svg>
                </button>
              </div>
              <div class="action-buttons">
                <button class="btn danger" id="deleteBtn" disabled title="Delete Script">Delete</button>
                <button class="btn primary" id="runBtn" title="Run Script (⌘R)">Run</button>
              </div>
            </div>
          </div>
          
          <div class="editor-container">
            <textarea id="code" placeholder="// Select a script from the sidebar or create a new one"></textarea>
            
            <!-- Info Panel -->
            <div class="info-panel" id="infoPanel">
              <div class="info-panel-scroll">
                <div class="info-header">
                  <span class="info-title">Results & Information</span>
                </div>
                <div class="info-filtering" id="infoFiltering">
                  <!-- Filtering controls will be added here later -->
                </div>
                <div class="info-list" id="infoContent">
                  <div class="info-placeholder">
                    <p>No results yet. Run a script to see information here.</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Footer outside main container for full width -->
      <div class="plugin-footer">
        <div class="footer-left">
          <button class="btn secondary" id="newScript" title="Create New Script (⌘N)">New Script</button>
        </div>
        <div class="footer-right">
          <button class="btn secondary" id="exportBtn" title="Export Current Script (⌘E)">Export Script</button>
          <button class="btn secondary" id="exportAllBtn" title="Export All User Scripts">Export All User Scripts</button>
          <button class="btn secondary" id="importBtn" title="Import Script (⌘I)">Import Script</button>
        </div>
      </div>
    </div>

    <script>
      // Help scripts will be populated by the build process from HELP folder

      // Pre-built scripts
      const prebuiltScripts = [
        // PLACEHOLDER_FOR_SCRIPTS
      ];

      // State
      let currentScript = null;
      let userScripts = [];
      let allScripts = [];
      let userGroups = new Map(); // Map of groupName -> {scripts: [], collapsed: false}
      let originalCode = '';
      let isResizing = false;
      let startX, startWidth; // Global scope for resizing
      let autosaveTimeout = null; // For debounced autosave
      let collapsedSections = new Set(); // Track collapsed sections

      // DOM elements
      const scriptList = document.getElementById('scriptList');
      const scriptTitle = document.getElementById('scriptTitle');
      const scriptStatus = document.getElementById('scriptStatus');
      const codeTextarea = document.getElementById('code');
      const newScriptBtn = document.getElementById('newScript');
      const runBtn = document.getElementById('runBtn');
      const deleteBtn = document.getElementById('deleteBtn');
      const exportBtn = document.getElementById('exportBtn');
      const importBtn = document.getElementById('importBtn');
      const infoPanelBtn = document.getElementById('infoPanelBtn');
      const maximizeBtn = document.getElementById('maximizeBtn');
      const infoPanel = document.getElementById('infoPanel');
      const infoContent = document.getElementById('infoContent');
      const exportAllBtn = document.getElementById('exportAllBtn');
      const resizer = document.getElementById('resizer');
      const sidebar = document.getElementById('sidebar');
      const searchInput = document.getElementById('searchInput');

      // Initialize CodeMirror
      const code = CodeMirror.fromTextArea(codeTextarea, {
        mode: 'javascript',
        theme: 'default',
        lineNumbers: true,
        indentUnit: 2,
        tabSize: 2,
        lineWrapping: false,
        autoCloseBrackets: true,
        matchBrackets: true,
        foldGutter: true,
        gutters: ['CodeMirror-linenumbers', 'CodeMirror-foldgutter'],
        scrollbarStyle: 'native'
      });

      // Ensure CodeMirror fills the container properly
      setTimeout(() => {
        code.refresh();
        code.setSize(null, '100%');
        
        // Initialize the app after CodeMirror is ready
        init();
      }, 100);

      function post(type, data = {}) {
        // Ensure the message type doesn't get overwritten by data.type
        const { type: dataType, ...cleanData } = data;
        const message = { pluginMessage: { type, ...cleanData } };
        debugLog('Posting message:', type, 'with data keys:', Object.keys(cleanData));
        debugLog('Full message being sent:', JSON.stringify(message, null, 2));
        parent.postMessage(message, '*');
      }

      // Debug logging functions to remove source references
      function debugLog(message, ...args) {
        // const log = console.log.bind(console);
        // setTimeout(() => log('%cCodeFig: ' + message, 'color: #0066cc; font-weight: bold;', ...args), 0);
      }

      function debugError(message, ...args) {
        const error = console.error.bind(console);
        setTimeout(() => error('%cCodeFig: ' + message, 'color: #cc0000; font-weight: bold;', ...args), 0);
      }

      // Update script list in sidebar
      function updateScriptList(searchTerm = '') {
        const filteredScripts = allScripts.filter(script =>
          script.name.toLowerCase().includes(searchTerm.toLowerCase()) &&
          !script.isTemporary // Don't show temporary scripts in the list
        );

        if (filteredScripts.length === 0 && searchTerm) {
          scriptList.innerHTML = '<div class="no-results">No scripts found</div>';
          return;
        }

        // Group scripts by type and sort alphabetically
        const helpScripts = filteredScripts.filter(s => s.type === 'help');
        const prebuiltScripts = filteredScripts.filter(s => s.type === 'prebuilt')
          .sort((a, b) => a.name.localeCompare(b.name));
        const userScripts = filteredScripts.filter(s => s.type === 'user')
          .sort((a, b) => a.name.localeCompare(b.name));

        let html = '';

        // <system-scripts>
        if (helpScripts.length > 0 || prebuiltScripts.length > 0) {
          html += '<div class="system-scripts">';
          
          // Help scripts (no grouping)
          if (helpScripts.length > 0) {
            helpScripts.forEach(script => {
              const isActive = currentScript && currentScript.name === script.name;
              html += `
                <div class="script-item ${isActive ? 'active' : ''}" onclick="selectScript('${script.name}')">
                  <div class="name">${script.name}</div>
                </div>
              `;
            });
          }
          
          // Example Scripts (with grouping)
          if (prebuiltScripts.length > 0) {
            html += createScriptsWithGroups(prebuiltScripts, 'prebuilt');
          }
          
          html += '</div>'; // Close system-scripts
        }
        
        // <divider>
        if ((helpScripts.length > 0 || prebuiltScripts.length > 0) && userScripts.length > 0) {
          html += '<div class="divider"></div>';
        }

        // <user-scripts>
        if (userScripts.length > 0) {
          html += '<div class="user-scripts">';
          html += createUserScriptsWithGroups(userScripts);
          html += '</div>'; // Close user-scripts
        }

        scriptList.innerHTML = html;
      }

      function createScriptSection(scripts, title, hideHeader = false) {
        let html = '';
        
        if (!hideHeader && title) {
          const headerClass = title === 'Example Scripts' ? 'example-scripts' : 'user-scripts';
          const sectionId = title.replace(/\s+/g, '-').toLowerCase();
          const isCollapsed = collapsedSections.has(sectionId);
          const toggleClass = isCollapsed ? 'collapsed' : '';
          
          // Check if any script in this section is selected
          const hasSelectedScript = scripts.some(s => currentScript && currentScript.name === s.name);
          const sectionHeaderClass = hasSelectedScript ? 'selected' : '';
          
          const expandedChevron = `<svg class="chevron-expanded" width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 7.5L6 4.5L3 7.5" stroke="#000" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" /></svg>`;
          const collapsedChevron = `<svg class="chevron-collapsed" width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 4.5L6 7.5L9 4.5" stroke="#000" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" /></svg>`;
          
          html += `
            <div class="section-header ${headerClass} ${sectionHeaderClass}" onclick="toggleSection('${sectionId}')">
              <div class="section-toggle ${toggleClass}">
                ${expandedChevron}
                ${collapsedChevron}
              </div>
              <span>${title}</span>
            </div>
          `;
          
          // Handle regular sections (Example Scripts, etc.)
          {
            // Regular section for Example Scripts
            const contentMaxHeight = isCollapsed ? '0' : `${scripts.length * 32 + 20}px`;
            const hasSelectedScript = scripts.some(s => currentScript && currentScript.name === s.name);
            const sectionContentClass = hasSelectedScript ? 'selected' : '';
            
            html += `<div class="section-content ${isCollapsed ? 'collapsed' : ''} ${sectionContentClass}" id="content-${sectionId}">`;
            
            // Use createScriptsWithGroups for proper grouping and alphabetical sorting
            html += createScriptsWithGroups(scripts, 'prebuilt');
            
            html += '</div>';
          }
        }
        
        // Don't add divider here - it's handled in updateScriptList
        
        return html;
      }
      
      function createScriptsWithGroups(scripts, scriptType) {
        let html = '';
        const ungroupedScripts = [];
        const groupedScripts = new Map();
        
        // Parse script names to extract groups and separate grouped/ungrouped scripts
        // Handle all slash variations: Test/Script, Test / Script, Test /Script, Test/ Script, etc.
        scripts.forEach(script => {
          const fullName = script.name;
          
          // Look for any slash (with or without spaces)
          const slashMatch = fullName.match(/^(.+?)\s*\/\s*(.+)$/);
          
          if (slashMatch) {
            // Script has group format - extract and normalize
            const groupName = slashMatch[1].trim();
            const scriptName = slashMatch[2].trim();
            
            // Normalize the full name to standard format "Group / Script"
            const normalizedFullName = `${groupName} / ${scriptName}`;
            
            if (!groupedScripts.has(groupName)) {
              groupedScripts.set(groupName, []);
            }
            groupedScripts.get(groupName).push({
              ...script,
              name: normalizedFullName, // Store normalized name
              displayName: scriptName,
              groupName: groupName
            });
          } else {
            // Ungrouped script
            ungroupedScripts.push({
              ...script,
              displayName: fullName,
              groupName: null
            });
          }
        });
        
        // Create a mixed array of ungrouped scripts and groups for alphabetical sorting
        const allItems = [];
        
        // Add ungrouped scripts
        ungroupedScripts.forEach(script => {
          allItems.push({
            type: 'script',
            name: script.displayName,
            script: script,
            sortKey: script.displayName
          });
        });
        
        // Add groups
        for (const [groupName, groupScripts] of groupedScripts) {
          allItems.push({
            type: 'group',
            name: groupName,
            scripts: groupScripts,
            sortKey: groupName
          });
        }
        
        // Sort all items alphabetically
        allItems.sort((a, b) => a.sortKey.localeCompare(b.sortKey));
        
        // Render items in sorted order
        allItems.forEach(item => {
          if (item.type === 'script') {
            // Render ungrouped script
            const script = item.script;
            const isActive = currentScript && currentScript.name === script.name;
            const scriptClass = scriptType === 'prebuilt' ? 'system-script' : 'user-script';
            html += `
              <div class="script-item ${scriptClass} ${isActive ? 'active' : ''}" onclick="selectScript('${script.name}')">
                <div class="name">${script.displayName}</div>
              </div>
            `;
          } else {
            // Render group
            const groupName = item.name;
            const scripts = item.scripts;
            const groupId = `group-${groupName.replace(/\s+/g, '-').toLowerCase()}`;
            const isGroupCollapsed = collapsedSections.has(groupId);
            const toggleClass = isGroupCollapsed ? 'collapsed' : '';
            const hasSelectedScript = scripts.some(s => currentScript && currentScript.name === s.name);
            const groupHeaderClass = hasSelectedScript ? 'selected' : '';
            const groupClass = hasSelectedScript ? 'selected' : '';
            const expandedChevron = `<svg class="chevron-expanded" width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 7.5L6 4.5L3 7.5" stroke="#000" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"/></svg>`;
            const collapsedChevron = `<svg class="chevron-collapsed" width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 4.5L6 7.5L9 4.5" stroke="#000" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"/></svg>`;
            
            html += `
              <div class="script-group ${groupClass}">
                <div class="group-header ${groupHeaderClass}" onclick="toggleSection('${groupId}')">
                  <div class="section-toggle ${toggleClass}">
                    ${expandedChevron}
                    ${collapsedChevron}
                  </div>
                  <span>${groupName}</span>
                </div>
                <div class="group-content ${isGroupCollapsed ? 'collapsed' : ''}" id="content-${groupId}">
            `;
            
            scripts.forEach(script => {
              const isActive = currentScript && currentScript.name === script.name;
              const scriptClass = scriptType === 'prebuilt' ? 'system-script' : 'user-script';
              html += `
                <div class="script-item ${scriptClass} grouped ${isActive ? 'active' : ''}" onclick="selectScript('${script.name}')">
                  <div class="name">${script.displayName}</div>
                </div>
              `;
            });
            
            html += `
                </div>
              </div>
            `;
          }
        });
        
        return html;
      }
      
      // Legacy function for backward compatibility
      function createUserScriptsWithGroups(userScripts) {
        return createScriptsWithGroups(userScripts, 'user');
      }

      // Select script
      function selectScript(scriptName) {
        const script = allScripts.find(s => s.name === scriptName);
        if (script) {
          selectScriptDirectly(script);
        }
      }

      function selectScriptDirectly(script) {
        debugLog('Selecting script:', script);
        currentScript = script;
        
        // Ensure CodeMirror is ready before setting value
        if (code && code.setValue) {
          code.setValue(script.code || '');
          // Use setTimeout to ensure CodeMirror updates properly
          setTimeout(() => {
            code.refresh();
            code.setSize(null, '100%');
          }, 10);
        }
        originalCode = script.code || '';
        
        // Check if this script uses @InfoPanel
        infoPanelAvailable = checkInfoPanelAvailability(script.code || '');
        updateInfoPanelButtonVisibility();
        
        // The script name already contains the group info if it exists (Group / Script Name)
        scriptTitle.textContent = script.name;
        
        // Only show badge for Example Scripts, hide for User Scripts
        if (script.type === 'prebuilt') {
          scriptStatus.textContent = 'Example Script';
          scriptStatus.style.display = 'block';
          // Remove editable class for example scripts
          scriptTitle.classList.remove('editable');
        } else if (script.type === 'help') {
          scriptStatus.textContent = 'Help';
          scriptStatus.style.display = 'block';
          // Remove editable class for help scripts
          scriptTitle.classList.remove('editable');
        } else {
          // Hide badge for user scripts (including new/temporary scripts)
          scriptStatus.style.display = 'none';
          // Add editable class for user scripts (but not temporary ones)
          if (!script.isTemporary) {
            scriptTitle.classList.add('editable');
          } else {
            scriptTitle.classList.remove('editable');
          }
        }
        
        // Save this as the last opened script (but not for temporary scripts)
        if (!script.isTemporary) {
          post('SET_LAST_OPENED', { name: script.name, scriptType: script.type });
        }
        
        updateButtonStates();
        updateScriptList(searchInput.value);
      }

      // Open the initial script based on last opened or default to Help
      function openInitialScript(lastOpenedScript) {
        let scriptToOpen = null;
        
        if (lastOpenedScript) {
          // Try to find the last opened script by name and type
          scriptToOpen = allScripts.find(s => 
            s.name === lastOpenedScript.name && 
            s.type === lastOpenedScript.type
          );
        }
        
        // If no last opened script or it doesn't exist, default to Help & Documentation
        if (!scriptToOpen) {
          scriptToOpen = allScripts.find(s => s.name === 'CodeFig - help & documentation');
        }
        
        // Fallback to first script if Help & Documentation doesn't exist
        if (!scriptToOpen && allScripts.length > 0) {
          scriptToOpen = allScripts[0];
        }
        
        if (scriptToOpen) {
          selectScriptDirectly(scriptToOpen);
        }
      }

      // Update button states
      function updateButtonStates() {
        const hasContent = code.getValue().trim().length > 0;
        const isTemporary = currentScript && currentScript.isTemporary;
        const isPrebuilt = currentScript && (currentScript.type === 'prebuilt' || currentScript.type === 'help');
        const isEmptyTemporary = isTemporary && !hasContent;

        // Run button: enabled if there's content
        runBtn.disabled = !hasContent;
        
        // Delete button: enabled for user scripts that aren't empty temporary scripts
        // - Disabled for empty temporary scripts (untitled with no content)
        // - Enabled for temporary scripts with content (they become "real" scripts)
        // - Enabled for all saved user scripts
        deleteBtn.disabled = isEmptyTemporary || !currentScript || currentScript.type !== 'user';

        // Hide Delete button for prebuilt scripts
        if (isPrebuilt) {
          deleteBtn.style.display = 'none';
        } else {
          deleteBtn.style.display = 'flex';
        }
      }

      // Info Panel functionality
      let infoPanelOpen = false;
      let isMaximized = false;
      const originalSize = { width: 1000, height: 600 };
      let infoPanelAvailable = false;

      function checkInfoPanelAvailability(scriptCode) {
        // Check if script imports @InfoPanel
        const hasInfoPanelImport = /@import.*@InfoPanel|@import.*InfoPanel/.test(scriptCode);
        return hasInfoPanelImport;
      }

      function updateInfoPanelButtonVisibility() {
        if (infoPanelAvailable) {
          infoPanelBtn.style.display = 'flex';
        } else {
          infoPanelBtn.style.display = 'none';
          // Also close panel if it's open
          if (infoPanelOpen) {
            infoPanelOpen = false;
            infoPanel.classList.remove('open');
            infoPanelBtn.classList.remove('active');
          }
        }
      }

      // Initialize button as hidden until a script is loaded
      function initializeInfoPanel() {
        infoPanelBtn.style.display = 'none';
      }

      function toggleInfoPanel() {
        infoPanelOpen = !infoPanelOpen;
        
        if (infoPanelOpen) {
          infoPanel.classList.add('open');
          infoPanelBtn.classList.add('active');
        } else {
          infoPanel.classList.remove('open');
          infoPanelBtn.classList.remove('active');
        }
        
        // Note: State saving would need to be done via message passing to backend
      }


      function toggleMaximize() {
        isMaximized = !isMaximized;
        
        if (isMaximized) {
          // Maximize to near full viewport size
          parent.postMessage({
            pluginMessage: { 
              type: 'RESIZE_WINDOW', 
              width: Math.min(1600, window.screen.width * 0.95),
              height: Math.min(1000, window.screen.height * 0.9)
            }
          }, '*');
          maximizeBtn.classList.add('active');
          maximizeBtn.title = 'Restore Window';
        } else {
          // Restore to original size
          parent.postMessage({
            pluginMessage: { 
              type: 'RESIZE_WINDOW', 
              width: originalSize.width,
              height: originalSize.height
            }
          }, '*');
          maximizeBtn.classList.remove('active');
          maximizeBtn.title = 'Maximize Window';
        }
        
        // Note: State saving would need to be done via message passing to backend
      }

      function displayInfoResults(data) {
        console.log('UI: displayInfoResults called with:', data);
        console.log('UI: Results array length:', data.results ? data.results.length : 'no results');
        
        const { title, results, type = 'info', grouping, showFilters = true, autoClose = false } = data;
        
        // Auto-open the InfoPanel when results are received (only for errors, not for success)
        if (!infoPanel.classList.contains('open') && !autoClose && type !== 'success') {
          console.log('UI: Auto-opening InfoPanel for results');
          toggleInfoPanel();
        }
        
        // Update main panel title (replace "Results & Information")
        const infoTitle = document.querySelector('.info-title');
        if (infoTitle && title) {
          infoTitle.textContent = title;
        }
        
        // Clear previous content
        infoContent.innerHTML = '';
        
        // Add filtering controls if grouping is enabled
        if (grouping && showFilters && grouping.modes && grouping.modes.length > 1) {
          const filterContainer = createFilterControls(grouping);
          infoContent.appendChild(filterContainer);
        }
        
        if (!results || results.length === 0) {
          const noResults = document.createElement('div');
          noResults.className = 'info-placeholder';
          noResults.innerHTML = '<p>No results found.</p>';
          infoContent.appendChild(noResults);
          return;
        }
        
        // Store data for filtering
        window.currentInfoData = data;
        
        // Display results (grouped or flat)
        if (grouping) {
          displayGroupedResults(results, grouping, type);
        } else {
          displayFlatResults(results, type);
        }
        
        // Auto-close panel after showing success message (only if panel was already open)
        if (autoClose && infoPanel.classList.contains('open')) {
          console.log('UI: Auto-closing InfoPanel after success message');
          setTimeout(() => {
            toggleInfoPanel();
          }, 2000); // Close after 2 seconds
        }
      }

      function createFilterControls(grouping) {
        const container = document.createElement('div');
        container.className = 'info-filter-controls';
        container.style.cssText = 'margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #e6e6e6;';
        
        const label = document.createElement('span');
        label.textContent = 'Group by: ';
        label.style.cssText = 'font-size: 11px; color: #666; margin-right: 8px;';
        container.appendChild(label);
        
        grouping.modes.forEach((mode, index) => {
          const button = document.createElement('button');
          button.textContent = mode.charAt(0).toUpperCase() + mode.slice(1);
          button.className = 'filter-btn';
          button.style.cssText = `
            font-size: 10px; 
            padding: 4px 8px; 
            margin-right: 4px; 
            border: 1px solid #ccc; 
            background: ${mode === grouping.default ? '#007AFF' : '#fff'}; 
            color: ${mode === grouping.default ? '#fff' : '#333'}; 
            border-radius: 4px; 
            cursor: pointer;
          `;
          
          button.addEventListener('click', () => {
            // Update active state
            container.querySelectorAll('.filter-btn').forEach(btn => {
              btn.style.background = '#fff';
              btn.style.color = '#333';
            });
            button.style.background = '#007AFF';
            button.style.color = '#fff';
            
            // Re-render with new grouping
            if (window.currentInfoData) {
              const newGrouping = { ...window.currentInfoData.grouping, default: mode };
              displayGroupedResults(window.currentInfoData.results, newGrouping, window.currentInfoData.type);
            }
          });
          
          container.appendChild(button);
        });
        
        return container;
      }

      function displayFlatResults(results, type) {
        results.forEach(result => {
          const item = document.createElement('div');
          item.className = `info-result-item ${result.severity || type}`;
          
          // Handle custom HTML structure
          if (result.html) {
            item.innerHTML = result.html;
          } else {
            // Standard message/details structure
            const message = document.createElement('div');
            message.className = 'info-result-message';
            // Support HTML content if message contains HTML tags, otherwise use textContent
            if (typeof result.message === 'string' && (result.message.includes('<') || result.message.includes('&'))) {
              message.innerHTML = result.message;
            } else {
              message.textContent = result.message || result.toString();
            }
            item.appendChild(message);
          
          if (result.details) {
            const details = document.createElement('div');
            details.className = 'info-result-details';
            // Support HTML content if details contains HTML tags, otherwise use textContent
            if (typeof result.details === 'string' && (result.details.includes('<') || result.details.includes('&'))) {
              details.innerHTML = result.details;
            } else {
              details.textContent = result.details;
            }
            item.appendChild(details);
          }
          }
          
          // Add click handler for node selection (single or multiple)
          if (result.nodeId || result.nodeIds) {
            item.style.cursor = 'pointer';
            item.addEventListener('click', () => {
              if (result.nodeIds && result.nodeIds.length > 0) {
                // Bulk selection
                parent.postMessage({
                  pluginMessage: { type: 'SELECT_NODES', nodeIds: result.nodeIds }
                }, '*');
              } else if (result.nodeId) {
                // Single selection
                parent.postMessage({
                  pluginMessage: { type: 'SELECT_NODE', nodeId: result.nodeId }
                }, '*');
              }
            });
          }
          
          infoContent.appendChild(item);
        });
      }

      function displayGroupedResults(results, grouping, type) {
        // Clear existing results (but keep filter controls)
        const existingResults = infoContent.querySelectorAll('.info-group, .info-result-item');
        existingResults.forEach(el => el.remove());
        
        const currentMode = grouping.default;
        
        // Group the results using built-in logic
        const grouped = groupResultsByMode(results, currentMode, grouping);
        
        // Display each group
        grouped.order.forEach(groupKey => {
          const group = grouped.groups[groupKey];
          
          // Create group header matching Figma design
          const groupHeader = document.createElement('div');
          groupHeader.className = 'info-group-header';
          groupHeader.style.cssText = `
            font-size: 12px; 
            font-weight: 600; 
            color: #333; 
            margin: 16px 0 8px 0; 
            padding: 0 0 4px 0; 
            border-bottom: 1px solid #e6e6e6;
            cursor: pointer;
            transition: color 0.2s ease;
          `;
          
          // Add hover effect
          groupHeader.addEventListener('mouseenter', () => {
            groupHeader.style.color = '#007AFF';
          });
          groupHeader.addEventListener('mouseleave', () => {
            groupHeader.style.color = '#333';
          });
          
          groupHeader.innerHTML = `${group.title} (${group.count})`;
          
          // Add bulk selection functionality
          groupHeader.addEventListener('click', () => {
            const nodeIds = group.results.map(result => result.nodeId).filter(id => id);
            if (nodeIds.length > 0) {
              parent.postMessage({
                pluginMessage: { type: 'SELECT_NODES', nodeIds: nodeIds }
              }, '*');
              
              // Visual feedback
              groupHeader.style.background = '#007AFF';
              groupHeader.style.color = '#fff';
              setTimeout(() => {
                groupHeader.style.background = '#f8f9fa';
                groupHeader.style.color = '#333';
              }, 200);
            }
          });
          
          infoContent.appendChild(groupHeader);
          
          // Create group container
          const groupContainer = document.createElement('div');
          groupContainer.className = 'info-group';
          groupContainer.style.cssText = 'margin-bottom: 12px;';
          
          // Add results list matching Figma design
          group.results.forEach((result, index) => {
            const item = document.createElement('div');
            item.className = 'info-result-item';
            item.style.cssText = `
              padding: 6px 0;
              margin: 0;
              cursor: pointer;
              border-bottom: 1px solid #f0f0f0;
              transition: background 0.15s ease;
            `;
            
            // Property type (main text) - extracted from variable name
            const propertyDisplay = document.createElement('div');
            propertyDisplay.style.cssText = `
              font-size: 11px;
              font-weight: 500;
              color: #333;
              margin-bottom: 2px;
            `;
            
            // Extract property type from variable name (e.g., "Typography/4xl/letter-spacing" -> "letter-spacing")
            let displayText = result.property || 'Unknown Property';
            if (result.variableName && result.variableName.includes('/')) {
              const parts = result.variableName.split('/');
              displayText = parts[parts.length - 1]; // Get the last part (property type)
            }
            propertyDisplay.textContent = displayText;
            item.appendChild(propertyDisplay);
            
            // Node info (secondary text)
            const nodeInfo = document.createElement('div');
            nodeInfo.style.cssText = `
              font-size: 10px;
              color: #666;
            `;
            nodeInfo.textContent = 'in ' + (result.nodeName || 'Unknown Node');
            item.appendChild(nodeInfo);
            
            // Hover effect
            item.addEventListener('mouseenter', () => {
              item.style.background = '#f8f9fa';
            });
            item.addEventListener('mouseleave', () => {
              item.style.background = 'transparent';
            });
            
            // Add click handler for individual node selection
            if (result.nodeId) {
              item.addEventListener('click', (e) => {
                e.stopPropagation(); // Prevent group selection
                parent.postMessage({
                  pluginMessage: { type: 'SELECT_NODE', nodeId: result.nodeId }
                }, '*');
                
                // Visual feedback
                item.style.background = '#007AFF';
                variableName.style.color = '#fff';
                details.style.color = '#fff';
                setTimeout(() => {
                  item.style.background = 'transparent';
                  variableName.style.color = '#333';
                  details.style.color = '#666';
                }, 200);
              });
            }
            
            groupContainer.appendChild(item);
          });
          
          infoContent.appendChild(groupContainer);
        });
        
        // Auto-open panel if not already open
        if (!infoPanelOpen) {
          toggleInfoPanel();
        }
      }

      function groupResultsByMode(results, mode, grouping) {
        var groups = {};
        var groupOrder = [];
        
        for (var i = 0; i < results.length; i++) {
          var result = results[i];
          var groupKey = getGroupKeyByMode(result, mode);
          
          if (!groups[groupKey]) {
            groups[groupKey] = {
              title: getGroupTitleByMode(groupKey, result, mode, grouping),
              results: [],
              count: 0
            };
            groupOrder.push(groupKey);
          }
          
          groups[groupKey].results.push(result);
          groups[groupKey].count++;
        }
        
        return {
          groups: groups,
          order: groupOrder
        };
      }

      function getGroupKeyByMode(result, mode) {
        if (mode === 'property') {
          // Group by variable name prefix (e.g., "Typography/4xl/letter-spacing" -> "Typography/4xl")
          if (result.variableName && result.variableName.includes('/')) {
            var parts = result.variableName.split('/');
            if (parts.length >= 2) {
              // For "Typography/4xl/letter-spacing" -> "Typography/4xl"
              // For "grey/900" -> "grey"
              return parts.slice(0, 2).join('/');
            }
          }
          
          // Fallback to property-based grouping for variables without clear naming
          if (result.property && ['fontSize', 'fontWeight', 'fontFamily', 'lineHeight', 'letterSpacing'].includes(result.property)) {
            return 'Typography Properties';
          }
          if (result.property === 'fills') {
            return 'Fill Properties';
          }
          
          return result.property || 'Other Variables';
        } else if (mode === 'node') {
          // Group by node name
          return result.nodeName || 'Unknown Node';
        }
        return 'other';
      }

      function getGroupTitleByMode(groupKey, result, mode, grouping) {
        if (mode === 'property') {
          // For variable name prefixes, use them directly as titles
          if (groupKey.includes('/')) {
            return groupKey; // e.g., "Typography/4xl" or "grey/900"
          }
          
          // Convert property names to readable titles
          if (grouping.propertyTitles && grouping.propertyTitles[groupKey]) {
            return grouping.propertyTitles[groupKey];
          }
          
          // Default property title mapping for fallback cases
          var propertyTitles = {
            'Typography Properties': 'Typography Properties',
            'Fill Properties': 'Fill Properties',
            'fontSize': 'Font Size',
            'fontWeight': 'Font Weight',
            'fontFamily': 'Font Family',
            'lineHeight': 'Line Height',
            'letterSpacing': 'Letter Spacing'
          };
          
          return propertyTitles[groupKey] || (groupKey.charAt(0).toUpperCase() + groupKey.slice(1) + ' Properties');
        } else if (mode === 'node') {
          // Show node type in parentheses if available
          var nodeType = '';
          if (result.nodeType) {
            nodeType = ' (' + result.nodeType + ')';
          }
          return groupKey + nodeType;
        }
        return groupKey;
      }

      // Create new script
      function createNewScript() {
        debugLog('Creating new script...');
        
        const newScript = {
          name: 'Untitled',
          type: 'user',
          code: '',
          isTemporary: true
        };

      // Auto-save current script (silent, no prompts)
      function autoSaveCurrentScript() {
        debugLog('autoSaveCurrentScript called');
        
        if (!currentScript || currentScript.type !== 'user') {
          debugLog('autoSaveCurrentScript - no current script or not user script');
          return;
        }
        
        const scriptCode = code.getValue();
        debugLog('autoSaveCurrentScript - script code length:', scriptCode.length);
        debugLog('autoSaveCurrentScript - script code preview:', scriptCode.substring(0, 50) + '...');
        
        // Don't save if there's no content
        if (!scriptCode.trim()) {
          debugLog('autoSaveCurrentScript - no content to save');
          return;
        }
        
        // Don't save if no changes
        if (scriptCode === originalCode) {
          debugLog('autoSaveCurrentScript - no changes detected');
          return;
        }
        
        debugLog('autoSaveCurrentScript - before update, currentScript.code length:', currentScript.code ? currentScript.code.length : 'undefined');
        debugLog('autoSaveCurrentScript - currentScript.isTemporary:', currentScript.isTemporary);
        
        // Update current script code first
        currentScript.code = scriptCode;
        originalCode = scriptCode;
        
        debugLog('autoSaveCurrentScript - after update, currentScript.code length:', currentScript.code.length);
        
        // If this is a temporary script that now has content, activate it
        if (currentScript.isTemporary) {
          debugLog('autoSaveCurrentScript - activating temporary script');
          activateUntitledScript();
        }
        
        const scriptData = {
          name: currentScript.name,
          code: scriptCode,
          type: 'user'
        };
        
        debugLog('autoSaveCurrentScript - about to save scriptData:', {
          name: scriptData.name,
          codeLength: scriptData.code.length,
          type: scriptData.type,
          group: scriptData.group
        });
        
        post('SAVE', scriptData);
        updateButtonStates();
        updateScriptList(searchInput.value);
      }

      // Activate an untitled script when it gets content
      function activateUntitledScript() {
        if (!currentScript || !currentScript.isTemporary) {
          debugLog('activateUntitledScript - no current script or not temporary');
          return;
        }
        
        debugLog('Activating untitled script with code length:', currentScript.code ? currentScript.code.length : 'undefined');
        debugLog('Activating untitled script with code preview:', currentScript.code ? currentScript.code.substring(0, 50) + '...' : 'undefined');
        
        // Generate a simple sequential name
        const generatedName = generateUntitledName();
        
        debugLog('Generated name:', generatedName);
        
        // Update the script immediately
        currentScript.name = generatedName;
        currentScript.isTemporary = false;
        
        debugLog('Updated script name to:', currentScript.name, 'isTemporary:', currentScript.isTemporary);
        
        // Update UI immediately
        scriptTitle.textContent = generatedName;
        scriptTitle.classList.add('editable');
        
        // Add to allScripts if not already there
        if (!allScripts.includes(currentScript)) {
          allScripts.push(currentScript);
          debugLog('Added script to allScripts. Total scripts:', allScripts.length);
        } else {
          debugLog('Script already in allScripts');
        }
        
        // Update last opened script
        post('SET_LAST_OPENED', { name: generatedName, scriptType: 'user' });
        
        // Update button states and sidebar
        updateButtonStates();
        updateScriptList(searchInput.value);
      }

      // Generate a simple sequential name: Untitled, Untitled 2, Untitled 3, etc.
      function generateUntitledName() {
        let baseName = 'Untitled';
        let counter = 0;
        let scriptName = baseName;
        
        while (allScripts.some(s => s.name === scriptName)) {
          counter++;
          scriptName = `${baseName} ${counter}`;
        }
        
        return scriptName;
      }

      // Save current script (with prompts for naming)
      function saveCurrentScript() {
        if (!currentScript) return;
        
        let scriptName = currentScript.name;
        
        // If it's temporary or starts with "Untitled", prompt for new name
        if (currentScript.isTemporary || currentScript.name.startsWith('Untitled')) {
          scriptName = prompt('Enter script name:', currentScript.name);
          if (!scriptName || scriptName.trim() === '') {
            post('NOTIFY', { message: 'Save cancelled - no name provided' });
            return;
          }
          scriptName = scriptName.trim();
          
          // Check for duplicates
          if (allScripts.some(s => s.name === scriptName && s !== currentScript)) {
            post('NOTIFY', { message: 'A script with that name already exists' });
            return;
          }
        }
        
        const scriptCode = code.getValue();
        
        // Normalize the name if it contains a slash
        const slashMatch = scriptName.match(/^(.+?)\s*\/\s*(.+)$/);
        const normalizedName = slashMatch ? `${slashMatch[1].trim()} / ${slashMatch[2].trim()}` : scriptName;
        
        const scriptData = {
          name: normalizedName,
          code: scriptCode,
          type: 'user'
        };
        
        // Update current script
        currentScript.name = normalizedName;
        currentScript.code = scriptCode;
        currentScript.type = 'user';
        currentScript.isTemporary = false;
        
        originalCode = scriptCode;
        
        // Update title (script name already contains group info if applicable)
        scriptTitle.textContent = normalizedName;
        
        post('SAVE', scriptData);
        updateButtonStates();
        updateScriptList(searchInput.value);
        
        post('NOTIFY', { message: `Saved: ${scriptName}` });
      }

      // Debounced autosave function
      function scheduleAutosave() {
        const currentCode = code.getValue();
        debugLog('scheduleAutosave called, code length:', currentCode.length);
        debugLog('scheduleAutosave - currentScript:', currentScript ? {name: currentScript.name, type: currentScript.type, isTemporary: currentScript.isTemporary} : 'null');
        
        // Don't schedule autosave for empty scripts
        if (!currentCode.trim()) {
          debugLog('scheduleAutosave - skipping: empty script');
          return;
        }
        
        // Clear any existing timeout
        if (autosaveTimeout) {
          clearTimeout(autosaveTimeout);
          debugLog('scheduleAutosave - cleared existing timeout');
        }
        
        debugLog('scheduleAutosave - scheduling autosave in 2 seconds...');
        
        // Schedule autosave after 2 seconds of inactivity
        autosaveTimeout = setTimeout(() => {
          debugLog('scheduleAutosave - timeout triggered, calling autoSaveCurrentScript');
          autoSaveCurrentScript();
        }, 2000);
      }

      // Delete current script
      function deleteCurrentScript() {
        if (!currentScript || currentScript.type !== 'user') return;
        
        // Handle temporary scripts with content differently
        if (currentScript.isTemporary) {
          // For temporary scripts, just clear and reset
          currentScript = null;

          originalCode = '';
          scriptTitle.textContent = 'Select a script';
          scriptTitle.classList.remove('editable');

          // Hide info panel button when no script is selected

          updateInfoPanelButtonVisibility();

          // Hide info panel button when no script is selected
          infoPanelAvailable = false;
